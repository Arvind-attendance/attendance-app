<!DOCTYPE html>
<html>
<head>
  <title>Attendance</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

  <h2>Office Attendance</h2>

  <button onclick="sendData('Check-In')" style="padding:15px; font-size:18px;">
    Check In
  </button>

  <br><br>

  <button onclick="sendData('Check-Out')" style="padding:15px; font-size:18px;">
    Check Out
  </button>

<script>
function sendData(action) {
  alert("Step 1: Button clicked");

  if (!navigator.geolocation) {
    alert("GPS not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(position) {
      alert("Step 2: GPS captured");

      var data = {
        name: "Sales_Rep_1",
        action: action,
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      alert("Step 3: Sending to API");

      fetch("PASTE_YOUR_SCRIPT_URL_HERE", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(response => response.text())
      .then(result => {
        alert("Step 4: Success → " + result);
      })
      .catch(error => {
        alert("Step 4: Error → " + error);
      });
    },
    function(error) {
      alert("GPS ERROR → " + error.message);
    }
  );
}
</script>

</body>
</html>
